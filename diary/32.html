 <h1>風景</h1>
  　すべてが変わってしまった。誰かが死んで、誰かが生まれて、僕が普遍的だと思っていた構造は、単なる流れの一部だったみたいだった。あれは誰だろうかと目を凝らす。でも瞬きをするたびに景色は変わり、消えたり、現れたり。心は擦り切れていく。それ自体が風景なのだろう。誰でも見れるものではなく、どこにでもあるものでもない。今ここにしかない、たった一つの美しい風景。壊れていく。汚い。
